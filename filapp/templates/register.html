<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>register</title> <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
     <style>
                table, th, td {
            /* This creates the solid black border */
            border: 1px solid #000000; 
            
            /* This prevents double-lines between cells and collapses them into single lines */
            border-collapse: collapse; 
            }

            th, td {
            /* This adds a little breathing room inside the cells so text isn't suffocated */
            padding: 8px; 
            }
        body{
            background-color: antiquewhite;
        }
            
          
     </style>

</head>
<body>
    <form class="col-4 mx-auto card p-2 shadow-lg  m-5" method="post"  enctype="multipart/form-data">
            {% csrf_token %}    
             <!--security -->
            <h2>Register now</h2>
            <hr>
             {% if messages %}
                 {% for message in messages %}
                <div class="alert alert-primary" role="alert">
                    
                    {{ message }}
                  
                </div>
                {% endfor %}
                {% endif %}
            <div class="mt-3"> 
                <label for="exampleInputEmail1">First name</label>
                <input name="first_name" required type="text" class="form-control">
            </div>
            <div class="mt-3"> 
                <label for="exampleInputEmail1">last name</label>
                <input name="last_name " required type="text" class="form-control">
                

            </div> 
            <div class="mt-3"> 
                <label for="exampleInputEmail1">Username</label>
                <input name="username " required type="text" class="form-control">
            </div> 
            <div class="mt-3"> 
                <label for="exampleInputEmail1">Password</label>
                <input name="password" required type="password" class="form-control">
            </div>
            <br>   
            
                 <button type="submit" class="btn btn-primary col-6">create account </button>
            <br>
           <p>Already have account?<a href="/login/" style="text-decoration: none;"><b>Login</b></a>

            

    </form>








    
</body>
</html>
