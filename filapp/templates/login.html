<html lang="en">
<head>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
     <style>
                table, th, td {
            /* This creates the solid black border */
            border: 1px solid #000000;

            }

            th, td {
            /* This adds a little breathing room inside the cells so text isn't suffocated */
            padding: 8px; 
            }
        body{
            background-color: antiquewhite;
        }
            
          
     </style>

</head>
<body>
    <form class="col-3 mx-auto card p-2 shadow-lg  m-5" method="post"  enctype="multipart/form-data">
            {% csrf_token %}    
             <!--security -->

            <div class="mt-3"> 
                <label for="exampleInputEmail1">Username</label>

            </div>
            <div class="mt-3"> 
                <label for="exampleInputEmail1">Password</label>

            </div> 
            <br>
