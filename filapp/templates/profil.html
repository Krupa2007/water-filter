<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box{
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
            width: 300px;
        }

        h2{
            text-align: center;
        }

        input{
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            box-sizing: border-box;
        }

        button{
            width: 100%;
            padding: 10px;
            background-color: blue;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover{
            background-color: darkblue;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Student Login</h2>

    <input type="text" id="username" placeholder="Enter Username">

    <input type="password" id="password" placeholder="Enter Password">

    <button onclick="login()">Login</button>
</div>
<a href="styles.html"></a>
<script>
function login() {
    window.location.href = "styles.html";
}
</script>

</body>
</html>
