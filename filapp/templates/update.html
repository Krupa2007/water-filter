<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pets</title>
     <!-- Include Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
     <style>
                table, th, td {
            /* This creates the solid black border */
            border: 1px solid #000000; 
            
            /* This prevents double-lines between cells and collapses them into single lines */
            border-collapse: collapse; 
            }

            th, td {
            /* This adds a little breathing room inside the cells so text isn't suffocated */
            padding: 8px; 
            }

            
          
            </style>
</head>
<body>
    <div class="container mt-5">

          
        <form class="col-6 mx-auto card p-3 shadow-lg " method="post"  enctype="multipart/form-data">
            {% csrf_token %}    
             <!--security -->
            <h2>Add Details </h2>
            <hr>
            <div class="mt-3"> 
                <label for="exampleInputEmail1">Name</label>
                <input name="name" required type="text" class="form-control">
            </div>
             
                
            <div class="mt-3">
               <label for="exampleInputEmail1">Email address</label>
                   <input  name="email"  required type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" placeholder="Enter email">
            </div>
            <div class="mt-3">
                <label for="exampleInputPassword1">Contact</label>
                <input  name="contact" required type="text" class="form-control"><br>
            </div>
                
            <button type="submit" class="btn btn-primary">Add Details </button>
            <a href="/main/" style="text-decoration: none;">click togo home</a>
            <hr>
        </form>
