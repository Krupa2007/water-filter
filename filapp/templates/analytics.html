<!DOCTYPE html>
<html>
<head>
    <title>Analytics Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .cards {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 22%;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .card p {
            font-size: 22px;
            font-weight: bold;
            color: #2c7be5;
        }

        .charts {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
        }

        .box {
            background: white;
            padding: 20px;
            width: 45%;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-top: 20px;
        }
    </style>
</head>

<body>

<h1>Water Filter Analytics</h1>

<!-- KPI CARDS -->
<div class="cards">

    <div class="card">
        <h3>Water Quality</h3>
        <p>88%</p>
    </div>

    <div class="card">
        <h3>Filter Health</h3>
        <p>92%</p>
    </div>

    <div class="card">
        <h3>Alerts</h3>
        <p>3</p>
    </div>

    <div class="card">
        <h3>Status</h3>
        <p>Good</p>
    </div>

</div>

<!-- CHARTS -->
<div class="charts">

    <div class="box">
        <h3>Water Quality Trend</h3>
        <canvas id="lineChart"></canvas>
    </div>

    <div class="box">
        <h3>Usage Trend</h3>
        <canvas id="barChart"></canvas>
    </div>

</div>

<script>
new Chart(document.getElementById("lineChart"), {
    type: 'line',
    data: {
        labels: ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],
        datasets: [{
            label: 'Quality %',
            data: [80,85,78,90,88,92,95],
            borderWidth: 2
        }]
    }
});

new Chart(document.getElementById("barChart"), {
    type: 'bar',
    data: {
        labels: ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],
        datasets: [{
            label: 'Usage',
            data: [30,40,35,50,45,60,55]
        }]
    }
});
</script>

</body>
</html>
