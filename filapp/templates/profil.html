<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        .profile-card {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 450px;
            padding: 40px 30px;
            text-align: center;
        }

        h2 {
            font-size: 24px;
            color: #2c3e50;
            margin-bottom: 25px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* Avatar Container with Plus Button Overlay */
        .avatar-container {
            position: relative;
            width: 130px;
            height: 130px;
            margin: 0 auto 30px auto;
        }

        .avatar-container img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #e2e8f0;
            background-color: #f8fafc;
        }

        .upload-badge {
            position: absolute;
            bottom: 2px;
            right: 2px;
            background: #3b82f6;
            color: white;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(59, 130, 246, 0.4);
            transition: background 0.2s, transform 0.2s;
        }

        .upload-badge:hover {
            background: #2563eb;
            transform: scale(1.05);
        }

        .avatar-container input[type="file"] {
            display: none;
        }

        /* Form Styling */
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #64748b;
            margin-bottom: 6px;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 15px;
            color: #334155;
            background: #f8fafc;
            transition: border-color 0.2s, background 0.2s;
            resize: none;
        }

        input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: #3b82f6;
            background: #fff;
        }

        .btn-save {
            width: 100%;
            padding: 12px;
            background: #2c3e50;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }

        .btn-save:hover {
            background: #1e293b;
        }
    </style>
</head>
<body>

<div class="profile-card">
    <h2>Profile</h2>
    
    <div class="avatar-container">
        <!-- Default placeholder image if nothing is saved yet -->
        <img id="profile-display" src="https://via.placeholder.com/130" alt="Profile Picture">
        <label for="file-input" class="upload-badge">+</label>
        <input type="file" id="file-input" accept="image/*" onchange="previewImage(event)">
    </div>

    <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" rows="3" placeholder="Tell us about yourself..."></textarea>
    </div>

    <div class="form-group">
        <label for="contact">Contact</label>
        <input type="text" id="contact" placeholder="Email or Phone Number">
    </div>

    <button class="btn-save" onclick="saveProfileData()">Save Changes</button>
</div>

<script>

    // JavaScript to preview the image instantly when a file is selected
    function previewImage(event) {
        const reader = new FileReader();
        reader.onload = function() {
            const output = document.getElementById('profile-display');
            output.src = reader.result;
        }
        if(event.target.files[0]) {
            reader.readAsDataURL(event.target.files[0]);
        }
    }

</html>
