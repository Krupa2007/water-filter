<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>forgot</title>
</head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
     <style>
                table, th, td {
            /* This creates the solid black border */
            border: 1px solid #000000; 
            
            /* This prevents double-lines between cells and collapses them into single lines */
            border-collapse: collapse; 
            }

            th, td {
            /* This adds a little breathing room inside the cells so text isn't suffocated */
            padding: 8px; 
            }
        body{
            background-color: antiquewhite;
        }
            
          
     </style>

</head>
<body>
    <form class="col-4 mx-auto card p-2 shadow-lg  m-5" method="post"  enctype="multipart/form-data">
            {% csrf_token %}    
             <!--security -->
            <h2>Forgot your password </h2>
            <hr>
            <p> Please enter the email adderss you'd like your password reset information sent to </p>
            <div class="mt-3"> 
                <label for="exampleInputEmail1">Email</label>
                <input name="pets_breed " required  type="text" class="form-control">
            </div>
            
            <br>   
                 
                 <button type="button" class="btn btn-primary">Request reset link </button>
               
            <br>
            <a href="/login/" style="text-decoration: none;"><b>back to login</b></a>

    </form>










</body>
</html>
