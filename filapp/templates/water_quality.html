<!DOCTYPE html>
<html>
<head>
    <title>Water Quality Report</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
     <style>
                table, th, td {
            /* This creates the solid black border */
            border: 1px solid #000000; 
            
            /* This prevents double-lines between cells and collapses them into single lines */
            border-collapse: collapse; 
            }

            th, td {
            /* This adds a little breathing room inside the cells so text isn't suffocated */
            padding: 8px; 
            }
        body{
            background-color: antiquewhite;
        }
            
          
     </style>
</head>
<body>
    
    <form class="col-4 mx-auto card p-2 shadow-lg  m-5" method="post"  enctype="multipart/form-data">
     <h1>Water Quality Report</h1>
    <p><strong>pH:</strong> 7.2</p>
    <p><strong>TDS:</strong> 180 ppm</p>
    <p><strong>Turbidity:</strong> Low</p>
    <p><strong>Status:</strong> Safe to Drink </p>
    </form>
</body>
</html>
